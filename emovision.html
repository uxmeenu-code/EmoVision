/* ── Image compression → stays under 4 MB API limit ───────────────────── */
function prepareImage(file) {
  return new Promise((resolve, reject) => {
    if (!file) { reject(new Error("No file.")); return; }

    const ext    = (file.name||"").split(".").pop().toLowerCase();
    const extMap = {jpg:"image/jpeg",jpeg:"image/jpeg",png:"image/png",gif:"image/gif",
                    webp:"image/webp",heic:"image/jpeg",heif:"image/jpeg",avif:"image/jpeg",
                    bmp:"image/jpeg",tiff:"image/jpeg",tif:"image/jpeg"};
    const okMime = ["image/jpeg","image/png","image/gif","image/webp"];
    const mime   = okMime.includes(file.type) ? file.type : (extMap[ext]||"image/jpeg");
    const maxB   = 4*1024*1024;
    const bSize  = s => Math.ceil(s.length*3/4);

    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read file."));
    reader.onload  = ev => {
      const raw = ev.target.result.split(",")[1];
      if (!raw) { reject(new Error("Empty file.")); return; }

      try {
        const url = URL.createObjectURL(file);
        const img = new Image();
        const t   = setTimeout(() => {
          try{URL.revokeObjectURL(url);}catch(_){}
          bSize(raw) <= maxB ? resolve({b64:raw,mime}) : reject(new Error("Image too large (>4 MB). Please use a smaller photo."));
        }, 7000);

        img.onload = () => {
          clearTimeout(t);
          try {
            const MAX = 1600;
            let w = img.naturalWidth||800, h = img.naturalHeight||600;
            if (w>MAX||h>MAX) { if(w>=h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }

            const draw = (dw,dh,q) => {
              const c=document.createElement("canvas");
              c.width=dw; c.height=dh;
              c.getContext("2d").drawImage(img,0,0,dw,dh);
              return c.toDataURL("image/jpeg",q).split(",")[1];
            };

            let q=0.88, b64=draw(w,h,q), tries=0;
            while(bSize(b64)>maxB && tries<14) {
              tries++;
              if(q>0.35) q=Math.max(0.28,q-0.1);
              else { w=Math.round(w*0.75); h=Math.round(h*0.75); q=0.85; }
              b64=draw(w,h,q);
            }
            try{URL.revokeObjectURL(url);}catch(_){}
            bSize(b64)<=maxB ? resolve({b64,mime:"image/jpeg"}) : reject(new Error("Image still too large after compression. Please use a smaller photo."));
          } catch(_) {
            try{URL.revokeObjectURL(url);}catch(__){}
            bSize(raw)<=maxB ? resolve({b64:raw,mime}) : reject(new Error("Compression failed. Please use a smaller image."));
          }
        };
        img.onerror = () => {
          clearTimeout(t);
          try{URL.revokeObjectURL(url);}catch(_){}
          bSize(raw)<=maxB ? resolve({b64:raw,mime}) : reject(new Error("Could not process image. Try a JPG or PNG."));
        };
        img.src = url;
      } catch(_) {
        bSize(raw)<=maxB ? resolve({b64:raw,mime}) : reject(new Error("Image too large."));
      }
    };
    reader.readAsDataURL(file);
  });
}

/* ── Claude API call ────────────────────────────────────────────────────── */
async function ask(system, content) {
  const r = await fetch(API_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body: JSON.stringify({model:MODEL, max_tokens:1024, system,
      messages:[{role:"user",content}]}),
  });
  if (!r.ok) {
    let m=`API error ${r.status}`;
    try{const e=await r.json();m=e?.error?.message||m;}catch(_){}
    // If auth failed, wipe the cached key so user can re-enter next time
    if (r.status===401 || r.status===403) {
      localStorage.removeItem("emo_api_key");
      m = "Invalid API key. Please refresh the page and enter a valid Anthropic API key.";
    }
    throw new Error(m);
  }
  const d  = await r.json();
  const tx = (d.content||[]).map(b=>b.text||"").join("");
  const s  = tx.indexOf("{"), e=tx.lastIndexOf("}");
  if(s===-1) throw new Error("No JSON in response. Please retry.");
  return JSON.parse(tx.slice(s,e+1));
}

function App() {
  const [phase,     setPhase]     = useState("upload");
  const [imgSrc,    setImgSrc]    = useState(null);
  const [loadMsg,   setLoadMsg]   = useState("");
  const [results,   setResults]   = useState(null);
  const [activeTab, setActiveTab] = useState("analysis");
  const [error,     setError]     = useState(null);
  const [dragOver,  setDragOver]  = useState(false);

  const run = useCallback(async (file) => {
    if (!file) return;

    // Accept any plausible image
    const ext      = (file.name||"").split(".").pop().toLowerCase();
    const imgExts  = ["jpg","jpeg","png","gif","webp","heic","heif","avif","bmp","tiff","tif","jfif"];
    const looksOk  = file.type.startsWith("image/") || imgExts.includes(ext) || file.type==="";

    setImgSrc(URL.createObjectURL(file));
    setPhase("analyzing");

    try {
      // Compress
      setLoadMsg("Preparing image…");
      const {b64, mime} = await prepareImage(file);
      const img = {type:"image", source:{type:"base64", media_type:mime, data:b64}};

      // Stage 1 — emotion + context
      setLoadMsg("Detecting emotions and reading the scene…");
      const a = await ask(
        "You are EmoVision's Emotional Intelligence Engine. Return ONLY valid JSON. No markdown, no explanation.",
        [img, {type:"text", text:
`Analyze this image. Return ONLY valid JSON — every field must reflect what is actually in this image:
{"primaryEmotion":"","secondaryEmotions":["","",""],"emotionConfidence":0,"energyLevel":0,"contextConfidence":0,"trendScore":0,"emotionalNarrative":"","scene":"","socialContext":"","colorMood":"","trendAesthetic":"","bodyLanguage":"","culturalSignals":"","timeOfDay":"","overallMomentScore":0}`
        }]
      );

      // Stage 2 — captions + hashtags
      setLoadMsg("Writing captions that capture the feeling…");
      const c = await ask(
        "You are EmoVision's Narrative Engine. Return ONLY valid JSON. No markdown.",
        [img, {type:"text", text:
`Image: emotion="${a.primaryEmotion}", scene="${a.scene}". Write creative outputs for THIS specific image.
Return ONLY this JSON:
{"captions":["[poetic 1-2 sentences]","[punchy max 10 words]","[storytelling 2-3 sentences]","[trending with emoji]","[minimal 3-6 words]"],"hashtags":["#tag1","#tag2","#tag3","#tag4","#tag5","#tag6","#tag7","#tag8"],"platformStrategy":"Two sentences on how to post this across Instagram, TikTok, and LinkedIn."}`
        }]
      );

      // Stage 3 — story + palette + styles
      setLoadMsg("Building your visual story and style directions…");
      const cr = await ask(
        "You are EmoVision's Creative Director. Return ONLY valid JSON. No markdown.",
        [img, {type:"text", text:
`Image: emotion="${a.primaryEmotion}", scene="${a.scene}". Create for THIS specific image.
Return ONLY this JSON:
{"story":{"frames":[{"title":"Opening Frame","description":"","caption":""},{"title":"Emotional Peak","description":"","caption":""},{"title":"Resolution","description":"","caption":""}]},"palette":{"colors":["#hex1","#hex2","#hex3","#hex4","#hex5"],"analysis":"","mood":"","temperature":""},"styles":[{"name":"Style 1","emoji":"🌟","styleName":"Vivid Cinematic","description":"","keywords":["","",""],"prompt":""},{"name":"Style 2","emoji":"🎞","styleName":"Film Grain","description":"","keywords":["","",""],"prompt":""},{"name":"Style 3","emoji":"🌊","styleName":"Soft Ethereal","description":"","keywords":["","",""],"prompt":""},{"name":"Style 4","emoji":"⚡","styleName":"High Contrast","description":"","keywords":["","",""],"prompt":""}]}`
        }]
      );

      setResults({
        analysis:         a,
        captions:         c.captions,
        hashtags:         c.hashtags,
        platformStrategy: c.platformStrategy,
        story:            cr.story,
        palette:          cr.palette,
        styles:           cr.styles,
      });
      setPhase("results");

    } catch(err) {
      console.error("EmoVision error:", err);
      setError(err.message || "Analysis failed. Please try again.");
      setPhase("upload");
    }
  }, []);

  const onFileInput = e => { const f=e.target.files?.[0]; if(f) run(f); e.target.value=""; };
  const onDrop      = e => { e.preventDefault(); setDragOver(false); const f=e.dataTransfer.files?.[0]; if(f) run(f); };
  const reset       = () => { setPhase("upload"); setResults(null); setImgSrc(null); setError(null); };

  return (
    <div style={{background:C.paper,minHeight:"100vh",color:C.ink}}>

      {/* NAV */}
      <nav style={{position:"sticky",top:0,zIndex:100,
        background:"rgba(245,242,236,0.95)",backdropFilter:"blur(12px)",
        borderBottom:`1px solid ${C.border}`,
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"0 1.5rem",height:54}}>

        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:30,height:30,borderRadius:8,background:C.ember,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>⚡</div>
          <span style={{fontWeight:800,fontSize:17,letterSpacing:"-0.02em"}}>
            <span style={{color:C.ember}}>Emo</span>Vision
          </span>
          <span style={{fontSize:10,background:C.ember,color:"#fff",
            padding:"2px 8px",borderRadius:999,fontWeight:700,letterSpacing:"0.06em"}}>AI</span>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:16}}>
          {phase!=="upload"&&(
            <button onClick={reset} style={{background:"none",border:`1px solid ${C.border}`,
              borderRadius:6,padding:"6px 16px",fontSize:12,fontWeight:600,color:C.muted}}>
              ↩ New Image
            </button>
          )}
          <div style={{display:"flex",gap:12}}>
            {[["Upload",0],["Analyze",1],["Results",2]].map(([lbl,i])=>{
              const done   = (i===0&&phase!=="upload")||(i===1&&phase==="results");
              const active = (i===0&&phase==="upload")||(i===1&&phase==="analyzing")||(i===2&&phase==="results");
              return (
                <div key={lbl} style={{display:"flex",alignItems:"center",gap:5,opacity:done||active?1:0.28}}>
                  <div style={{width:22,height:22,borderRadius:"50%",fontSize:11,fontWeight:700,
                    background:done?C.teal:active?C.ember:C.border,
                    color:done||active?"#fff":C.muted,
                    display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.3s"}}>
                    {done?"✓":i+1}
                  </div>
                  <span style={{fontSize:11,fontWeight:600,color:active?C.ink:C.muted,
                    textTransform:"uppercase",letterSpacing:"0.05em"}}>{lbl}</span>
                </div>
              );
            })}
          </div>
        </div>
      </nav>

      {/* ── UPLOAD ── */}
      {phase==="upload"&&(
        <div className="fade" style={{maxWidth:640,margin:"0 auto",padding:"3.5rem 1.5rem"}}>

          <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:7,
              background:C.ember+"18",border:`1px solid ${C.ember}30`,
              borderRadius:999,padding:"5px 16px",marginBottom:20}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:C.ember,
                display:"inline-block",animation:"pulse 1.5s infinite"}}/>
              <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",
                textTransform:"uppercase",color:C.ember}}>Emotion-Driven AI</span>
            </div>
            <h1 style={{fontSize:38,fontWeight:800,letterSpacing:"-0.03em",lineHeight:1.08,marginBottom:14}}>
              Upload a photo.<br/>
              <span style={{color:C.ember}}>Feel the story.</span>
            </h1>
            <p style={{fontSize:14,color:C.muted,maxWidth:400,margin:"0 auto",lineHeight:1.8}}>
              EmoVision reads the emotional meaning of your moment and generates captions, hashtags, story arcs, colour palettes, and style directions — automatically.
            </p>
          </div>

          {/* Drop zone — label wraps input so entire zone is clickable */}
          <label
            onDragOver={e=>{e.preventDefault();setDragOver(true)}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={onDrop}
            style={{display:"block",cursor:"pointer",marginBottom:16,
              border:`2px dashed ${dragOver?C.ember:C.border}`,
              borderRadius:12,padding:"3rem 2rem",textAlign:"center",
              background:dragOver?C.ember+"09":C.surface,
              transition:"all 0.25s",
              boxShadow:dragOver?`0 0 0 4px ${C.ember}22`:"none"}}>
            <input type="file" accept="image/*"
              style={{position:"absolute",width:1,height:1,opacity:0,pointerEvents:"none"}}
              onChange={onFileInput}/>
            <div style={{fontSize:52,marginBottom:14}}>📸</div>
            <div style={{fontWeight:700,fontSize:18,marginBottom:8,color:C.ink}}>
              Drop your image here
            </div>
            <div style={{color:C.muted,fontSize:13,marginBottom:24}}>
              or click anywhere in this box to browse your files
            </div>
            <div style={{display:"inline-flex",alignItems:"center",gap:8,background:C.ember,
              color:"#fff",borderRadius:8,padding:"12px 30px",fontSize:13,fontWeight:700,
              letterSpacing:"0.05em",textTransform:"uppercase",pointerEvents:"none"}}>
              ↑ Choose Image
            </div>
            <div style={{marginTop:16,fontSize:11,color:C.muted}}>
              JPG · PNG · WEBP · HEIC · GIF · Any size (auto-compressed)
            </div>
          </label>

          {error&&(
            <div style={{padding:"12px 16px",background:"#fff0ed",
              border:`1px solid ${C.ember}44`,borderRadius:8,
              color:C.ember,fontSize:13,lineHeight:1.5,marginBottom:16}}>
              ⚠️ {error}
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {[["🧠","Emotion Analysis","27-state detection"],
              ["✍️","5 Captions","Poetic to punchy"],
              ["🔖","Hashtags","Trend-matched"],
              ["📖","Story Arc","3-frame narrative"],
              ["🎨","Colour Palette","Emotion-mapped"],
              ["✨","Style Prompts","AI gen-ready"],
            ].map(([e,l,d])=>(
              <div key={l} style={{background:C.surface,border:`1px solid ${C.border}`,
                borderRadius:8,padding:"14px 10px",textAlign:"center"}}>
                <div style={{fontSize:24,marginBottom:6}}>{e}</div>
                <div style={{fontSize:12,fontWeight:700,marginBottom:3,color:C.ink}}>{l}</div>
                <div style={{fontSize:11,color:C.muted}}>{d}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── ANALYZING ── */}
      {phase==="analyzing"&&(
        <div className="fade" style={{maxWidth:540,margin:"0 auto",padding:"3rem 1.5rem"}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,
            padding:"2rem",display:"flex",gap:"1.5rem",alignItems:"flex-start"}}>
            {imgSrc&&(
              <img src={imgSrc} alt="" style={{width:120,height:120,objectFit:"cover",
                borderRadius:8,flexShrink:0,border:`3px solid ${C.ember}`}}/>
            )}
            <div style={{flex:1,minWidth:0}}>
              <Tag color={C.ember}>Analyzing</Tag>
              <h2 style={{fontSize:16,fontWeight:800,margin:"10px 0 4px",
                letterSpacing:"-0.02em",lineHeight:1.35,color:C.ink}}>
                Reading the emotional truth of your moment
              </h2>
              <Loader msg={loadMsg}/>
            </div>
          </div>
        </div>
      )}

      {/* ── RESULTS ── */}
      {phase==="results"&&results&&(
        <div className="fade" style={{maxWidth:1060,margin:"0 auto",padding:"2rem 1.5rem"}}>
          <div style={{display:"grid",gridTemplateColumns:"250px 1fr",gap:"1.75rem",alignItems:"start"}}>

            {/* Sidebar */}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {imgSrc&&(
                <img src={imgSrc} alt="" style={{width:"100%",aspectRatio:"1",
                  objectFit:"cover",borderRadius:8,border:`2px solid ${C.border}`}}/>
              )}
              <div style={{background:C.ink,borderRadius:8,padding:"1.1rem",color:"#fff"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",
                  letterSpacing:"0.08em",marginBottom:8}}>Moment Score</div>
                <div style={{fontSize:34,fontWeight:800,color:C.gold,letterSpacing:"-0.02em",lineHeight:1}}>
                  {results.analysis.overallMomentScore||"—"}
                  <span style={{fontSize:14,color:"rgba(255,255,255,0.3)",fontWeight:400}}>/100</span>
                </div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:7,lineHeight:1.5}}>
                  {results.analysis.emotionalNarrative}
                </div>
              </div>
              {[
                ["Primary", results.analysis.primaryEmotion,   C.ember],
                ["Scene",   results.analysis.scene,            C.teal],
                ["Time",    results.analysis.timeOfDay,        C.gold],
                ["Trend",   results.analysis.trendAesthetic,   C.violet],
              ].map(([k,v,col])=>(
                <div key={k} style={{background:C.surface,border:`1px solid ${C.border}`,
                  borderLeft:`3px solid ${col}`,padding:"8px 12px",borderRadius:4}}>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{k}</div>
                  <div style={{fontSize:13,fontWeight:700,color:C.ink}}>{v||"—"}</div>
                </div>
              ))}
              <button onClick={reset} style={{background:"none",border:`1px solid ${C.border}`,
                borderRadius:8,padding:10,fontSize:12,fontWeight:600,color:C.muted}}>
                ↩ Analyze Another Image
              </button>
            </div>

            {/* Tab area */}
            <div>
              <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,
                marginBottom:20,overflowX:"auto"}}>
                {TABS.map(tab=>(
                  <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{
                    background:"none",border:"none",padding:"12px 14px",
                    fontSize:12,fontWeight:700,
                    color:activeTab===tab.id?C.ember:C.muted,
                    borderBottom:activeTab===tab.id?`2px solid ${C.ember}`:"2px solid transparent",
                    whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:"0.06em",
                    display:"flex",alignItems:"center",gap:5,transition:"color 0.2s"}}>
                    {tab.emoji} {tab.label}
                  </button>
                ))}
              </div>
              <div key={activeTab} className="fade">
                {activeTab==="analysis" && <AnalysisPanel  a={results.analysis}/>}
                {activeTab==="captions" && <CaptionsPanel  captions={results.captions}/>}
                {activeTab==="hashtags" && <HashtagsPanel  hashtags={results.hashtags} platformStrategy={results.platformStrategy}/>}
                {activeTab==="story"    && <StoryPanel     story={results.story}/>}
                {activeTab==="palette"  && <PalettePanel   palette={results.palette}/>}
                {activeTab==="styles"   && <StylesPanel    styles={results.styles}/>}
              </div>
            </div>
          </div>
        </div>
      )}

      <footer style={{borderTop:`1px solid ${C.border}`,padding:"1.5rem",
        textAlign:"center",marginTop:"4rem"}}>
        <span style={{fontWeight:800,fontSize:14}}>
          <span style={{color:C.ember}}>Emo</span>Vision
        </span>
        <span style={{color:C.muted,fontSize:12,marginLeft:10}}>
          Emotion-Driven AI Creative Platform · Powered by Claude
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
